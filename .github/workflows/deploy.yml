name: Deploy to Zenn & Qiita

on:
  push:
    branches:
      - main
    # CI が生成したコミット（[CI] プレフィックス）ではトリガーしない
    # → 下の "if" 条件で制御（GitHub Actions 側の制約のため paths-ignore では防げない）

jobs:
  deploy:
    # [CI] プレフィックスのコミットは再トリガーしない（無限ループ防止）
    if: "!startsWith(github.event.head_commit.message, '[CI]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── 1. チェックアウト ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js セットアップ ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. 依存パッケージのインストール ───────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. drafts/ → articles/ 変換 ────────────────────────────────────────
      - name: Convert drafts to platform-specific articles
        run: node src/convert.js

      # ── 5. 変換済みファイルを PR として作成 ──────────────────────────────
      - name: Create Pull Request for converted articles
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[CI] sync articles from drafts"
          branch: ci/deploy-sync-articles
          delete-branch: true
          title: "[CI] Sync articles from drafts"
          body: |
            `drafts/` に追加・変更された記事を各プラットフォーム向けに変換しました。
            - `articles/zenn/` および `articles/qiita/` に配備済み
            - 変換済みの draft は削除済み

      # ── 6. 変更がある場合のみ auto-merge を有効化 ─────────────────────────
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Qiita へ公開 ────────────────────────────────────────────────────
      # @qiita/qiita-cli は dotenvx 経由で .env からトークンを読む。
      # QIITA_TOKEN を一時的に .env に書き込み、publish 後に削除する。
      - name: Publish to Qiita
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          echo "QIITA_TOKEN=$QIITA_TOKEN" > .env
          npx qiita publish --all
          rm .env
