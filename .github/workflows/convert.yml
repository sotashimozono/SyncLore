name: Convert Drafts to Articles

on:
  push:
    branches: [main]
    paths: ["drafts/**"]

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # drafts/ を変換して articles/ に出力（変換済みファイルは drafts/ から削除）
      - name: Convert drafts to articles
        run: node src/convert.js

      # 変換結果を PR として作成
      - name: Create Pull Request for converted articles
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[CI] convert: sync articles from drafts"
          branch: ci/sync-articles
          delete-branch: true
          title: "[CI] Sync articles from drafts"
          body: |
            `drafts/` に追加・変更された記事を各プラットフォーム向けに変換しました。
            - `public/` および `books/` に配備済み
            - 変換済みの draft は削除済み

      # 変更がある場合のみ auto-merge を有効化
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
